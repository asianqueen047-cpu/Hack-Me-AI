<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"
  />
  <title>HACK ME AI | Chat</title>

  <style>

    :root {
      --page-bg: #eef3f8;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #111827;
      --muted: #64748b;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-soft: #eff6ff;
      --bot-bubble: #ffffff;
      --user-bubble: #2563eb;
      --shadow: 0 24px 70px rgba(15, 23, 42, 0.14);
      --radius-lg: 28px;
      --radius-md: 18px;
      --safe-bottom: env(safe-area-inset-bottom);
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    input,
    button,
    textarea,
    select {
      font-family: Arial, Helvetica, sans-serif;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.16), transparent 32%),
        radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.14), transparent 34%),
        var(--page-bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .chat-shell {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 0;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 920px;
      height: 100%;
      background: rgba(255, 255, 255, 0.96);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: none;
    }

    .chat-header {
      flex: 0 0 auto;
      padding: 18px 18px 16px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 250, 252, 0.94));
      border-bottom: 1px solid var(--line);
      z-index: 10;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .brand-block {
      min-width: 0;
    }

    .brand-kicker {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary-dark);
      font-size: 0.72rem;
      font-weight: 700;
      font-style: normal;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .brand-title {
      font-size: clamp(1.15rem, 3vw, 1.45rem);
      line-height: 1.1;
      font-weight: 800;
      font-style: normal;
      color: var(--text);
      letter-spacing: -0.035em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-subtitle {
      margin-top: 4px;
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 700;
      font-style: italic;
    }

    .header-note {
      display: none;
      max-width: 260px;
      text-align: right;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.35;
    }

    .chat-box {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 18px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      background:
        linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
    }

    .chat-box::-webkit-scrollbar {
      width: 9px;
    }

    .chat-box::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-box::-webkit-scrollbar-thumb {
      background: #d7dee8;
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: content-box;
    }

    .message {
      max-width: min(84%, 680px);
      padding: 13px 16px;
      border-radius: 20px;
      font-size: 0.96rem;
      line-height: 1.5;
      word-wrap: break-word;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      opacity: 0;
      transform: translateY(8px);
      animation: enter 180ms ease forwards;
    }

    @keyframes enter {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .bot-message {
      align-self: flex-start;
      background: var(--bot-bubble);
      color: #1f2937;
      border: 1px solid var(--line);
      border-bottom-left-radius: 7px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
    }

    .chat-box .bot-message:first-child {
      font-style: italic;
    }

    .user-message {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--primary), #3b82f6);
      color: #ffffff;
      border-bottom-right-radius: 7px;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.22);
    }

    .typing-wrap {
      display: none;
      flex: 0 0 auto;
      padding: 0 18px 12px;
      background: #fbfdff;
    }

    .typing-bubble {
      width: fit-content;
      max-width: 140px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      border-bottom-left-radius: 7px;
      background: #ffffff;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
    }

    .typing-bubble span {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #94a3b8;
      animation: typing 1.1s ease-in-out infinite;
    }

    .typing-bubble span:nth-child(2) {
      animation-delay: 0.14s;
    }

    .typing-bubble span:nth-child(3) {
      animation-delay: 0.28s;
    }

    @keyframes typing {
      0%, 70%, 100% {
        transform: translateY(0);
        opacity: 0.5;
      }
      35% {
        transform: translateY(-4px);
        opacity: 1;
      }
    }

    .chat-footer {
      flex: 0 0 auto;
      padding: 12px 14px max(12px, var(--safe-bottom));
      background: rgba(255, 255, 255, 0.96);
      border-top: 1px solid var(--line);
    }

    .input-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 6px;
      border: 1.5px solid #dbe3ee;
      border-radius: 999px;
      background: #ffffff;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    .input-bar:focus-within {
      border-color: rgba(37, 99, 235, 0.75);
      box-shadow: 0 12px 32px rgba(37, 99, 235, 0.12);
    }

    .message-input {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 1rem;
      line-height: 1.3;
      padding: 10px 6px 10px 12px;
    }

    .message-input::placeholder {
      color: #94a3b8;
    }

    input[type="search"]::-webkit-search-decoration,
    input[type="search"]::-webkit-search-cancel-button,
    input[type="search"]::-webkit-search-results-button,
    input[type="search"]::-webkit-search-results-decoration {
      display: none;
    }

    .send-button {
      flex: 0 0 auto;
      min-width: 78px;
      height: 42px;
      border: 0;
      border-radius: 999px;
      background: var(--primary);
      color: #ffffff;
      cursor: pointer;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      transition: background 160ms ease, transform 120ms ease, opacity 160ms ease;
    }

    .send-button:hover {
      background: var(--primary-dark);
    }

    .send-button:active {
      transform: scale(0.97);
    }

    .send-button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    @media (min-width: 641px) {
      .chat-shell {
        padding: 22px;
        align-items: center;
      }

      .chat-wrapper {
        height: min(880px, 94vh);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        border: 1px solid rgba(255, 255, 255, 0.7);
      }

      .chat-header {
        padding: 22px 24px 18px;
      }

      .chat-box {
        padding: 24px;
        gap: 16px;
      }

      .typing-wrap {
        padding-inline: 24px;
      }

      .chat-footer {
        padding: 14px 18px 18px;
      }

      .header-note {
        display: block;
      }

      .message {
        font-size: 1rem;
      }
    }

    @media (max-width: 420px) {
      .chat-header {
        padding: 15px 14px 13px;
      }

      .brand-kicker {
        font-size: 0.66rem;
        margin-bottom: 6px;
      }

      .brand-title {
        font-size: 1.08rem;
      }

      .brand-subtitle {
        font-size: 0.77rem;
      }

      .chat-box {
        padding: 14px;
      }

      .message {
        max-width: 90%;
        padding: 12px 14px;
        font-size: 0.94rem;
      }

      .chat-footer {
        padding-inline: 10px;
      }

      .send-button {
        min-width: 66px;
        height: 40px;
        font-size: 0.88rem;
      }

      .message-input {
        font-size: 0.95rem;
        padding-left: 10px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .message,
      .typing-bubble span,
      .send-button,
      .input-bar {
        animation: none;
        transition: none;
      }

      .message {
        opacity: 1;
        transform: none;
      }

      .chat-box {
        scroll-behavior: auto;
      }
    }
  </style>
</head>

<body>
  <main class="chat-shell">
    <section class="chat-wrapper" id="chatWrapper" aria-label="HACK ME AI chat interface">
      <header class="chat-header">
        <div class="brand-row">
          <div class="brand-block">
            <div class="brand-kicker">AI Assistant</div>
            <h1 class="brand-title">HACK ME AI</h1>
            <p class="brand-subtitle">Made by Asian Queen</p>
          </div>
        </div>
      </header>

      <div id="chatBox" class="chat-box" aria-live="polite" aria-relevant="additions">
        <div class="message bot-message">Hello! I am your AI assistant. Send a message and I will help you.</div>
      </div>

      <div id="typingIndicator" class="typing-wrap" aria-hidden="true">
        <div class="typing-bubble" aria-label="Assistant is typing">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>

      <form id="chatForm" class="chat-footer" autocomplete="off">
        <div class="input-bar">
          <input
            id="msgPromptBox"
            class="message-input"
            type="search"
            name="q_chat_message"
            autocomplete="off"
            placeholder="Type your message..."
            enterkeyhint="send"
            aria-label="Message"
          />
          <button class="send-button" type="submit" id="sendBtn">Send</button>
        </div>
      </form>
    </section>
  </main>

  <script>
    "use strict";

    const getById = (id) => document.getElementById(id);

    const wrapper = getById("chatWrapper");
    const chatBox = getById("chatBox");
    const chatForm = getById("chatForm");
    const input = getById("msgPromptBox");
    const sendButton = getById("sendBtn");
    const typingIndicator = getById("typingIndicator");

    const scrollToBottom = () => {
      requestAnimationFrame(() => {
        chatBox.scrollTo({
          top: chatBox.scrollHeight,
          behavior: "smooth"
        });
      });
    };

    const escapeHTML = (text) => {
      const node = document.createElement("div");
      node.textContent = text;
      return node.innerHTML;
    };

    const addMessage = (text, sender) => {
      const safeText = escapeHTML(String(text || ""));
      const messageClass = sender === "user" ? "user-message" : "bot-message";
      chatBox.insertAdjacentHTML(
        "beforeend",
        `<div class="message ${messageClass}">${safeText}</div>`
      );
      scrollToBottom();
    };

    const setLoading = (isLoading) => {
      input.disabled = isLoading;
      sendButton.disabled = isLoading;
      sendButton.textContent = isLoading ? "Sending" : "Send";
      typingIndicator.style.display = isLoading ? "block" : "none";
      typingIndicator.setAttribute("aria-hidden", String(!isLoading));
      scrollToBottom();
    };

    const readReply = (data) => {
      if (!data || typeof data !== "object") return "Empty response received.";
      return data.reply || data.response || data.message || "Empty response received.";
    };

    const sendMessage = async () => {
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, "user");
      input.value = "";
      setLoading(true);

      try {
        const response = await fetch("api.php", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        if (!response.ok) {
          throw new Error("Request failed");
        }

        const data = await response.json();
        addMessage(readReply(data), "bot");
      } catch (error) {
        addMessage("Network or server error. Please try again.", "bot");
      } finally {
        setLoading(false);

        if (window.matchMedia("(min-width: 769px)").matches) {
          input.focus();
        }
      }
    };

    chatForm.addEventListener("submit", (event) => {
      event.preventDefault();
      sendMessage();
    });

    const syncMobileViewport = () => {
      if (!window.visualViewport || window.innerWidth > 640) {
        wrapper.style.height = "";
        return;
      }

      wrapper.style.height = `${window.visualViewport.height}px`;
      scrollToBottom();
    };

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", syncMobileViewport);
      window.visualViewport.addEventListener("scroll", syncMobileViewport);
    }

    window.addEventListener("orientationchange", () => {
      setTimeout(syncMobileViewport, 100);
    });

    syncMobileViewport();
  </script>
</body>
</html>
